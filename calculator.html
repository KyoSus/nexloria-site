<!DOCTYPE html>
<html>
<head>
<title>Calculator - Nexloria</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
.wrapper {
  max-width: 520px;
  margin: 120px auto;
  padding: 20px;
}

.calc-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(59,130,246,0.15);
  border-radius: 20px;
  padding: 30px;
  backdrop-filter: blur(12px);
}

/* Title */
.calc-title {
  font-size: 1.6rem;
  margin-bottom: 15px;
}

/* Selection preview */
.selection-preview {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: 12px;
  background: rgba(59,130,246,0.08);
  border: 1px solid rgba(59,130,246,0.2);
  margin-bottom: 15px;
}

.selection-preview img {
  width: 26px;
  height: 26px;
}

.selection-text {
  font-size: 0.9rem;
  color: #ccc;
}

/* Inputs */
label {
  font-size: 0.8rem;
  color: #888;
  margin-top: 12px;
  display: block;
}

select, input {
  width: 100%;
  margin-top: 6px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: white;
  padding: 12px;
  border-radius: 10px;
}

select option {
  background: #0a0a0a;
  color: white;
}

.result-box {
  margin-top: 20px;
  padding: 16px;
  border-radius: 14px;
  background: rgba(59,130,246,0.08);
  border: 1px solid rgba(59,130,246,0.2);
}

.result-main {
  font-size: 1.4rem;
}

.result-sub {
  font-size: 0.9rem;
  color: #aaa;
}

/* Mode buttons */
.mode {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.mode button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #222;
  background: #111;
  color: #aaa;
  cursor: pointer;
}

.mode button.active {
  border-color: var(--accent);
  color: white;
  box-shadow: 0 0 10px rgba(59,130,246,0.4);
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<nav>
<a href="/">Home</a>
<a href="/services.html">Services</a>
<a href="/calculator.html">Calculator</a>
<a href="/contact.html">Contact</a>
</nav>

<div class="wrapper">
<div class="calc-card">

<div class="calc-title">Calculator</div>

<!-- MODE -->
<div class="mode">
<button id="servicesBtn" class="active">Services</button>
<button id="exchangeBtn">Exchange</button>
</div>

<!-- PREVIEW -->
<div class="selection-preview">
<img id="icon" src="">
<div class="selection-text" id="selectionText">Select options</div>
</div>

<!-- SERVICES -->
<div id="servicesUI">
<label>Platform</label>
<select id="platform"></select>

<label>Service</label>
<select id="service"></select>
</div>

<!-- EXCHANGE -->
<div id="exchangeUI" style="display:none;">
<label>From</label>
<select id="from"></select>

<label>To</label>
<select id="to"></select>
</div>

<label>Amount</label>
<input type="number" id="amount">

<div class="result-box">
<div class="result-main" id="mainResult">$0</div>
<div class="result-sub" id="subResult">Enter amount</div>
</div>

</div>
</div>

<footer style="text-align:center; padding:40px; color:#999; border-top:1px solid rgba(255,255,255,0.05);">
© 2026 Nexloria
</footer>

<script src="script.js"></script>

<script>
const icon = document.getElementById("icon");
const selectionText = document.getElementById("selectionText");

const servicesBtn = document.getElementById("servicesBtn");
const exchangeBtn = document.getElementById("exchangeBtn");

const servicesUI = document.getElementById("servicesUI");
const exchangeUI = document.getElementById("exchangeUI");

const platform = document.getElementById("platform");
const service = document.getElementById("service");
const from = document.getElementById("from");
const to = document.getElementById("to");

const amountInput = document.getElementById("amount");
const mainResult = document.getElementById("mainResult");
const subResult = document.getElementById("subResult");

let mode = "services";

/* ICON MAP (use your own images later if you want) */
const icons = {
  roblox: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/roblox/roblox-original.svg",
  twitch: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/twitch/twitch-original.svg",
  tiktok: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/twitter/twitter-original.svg",
  instagram: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/instagram/instagram-original.svg",
  bitcoin: "https://cryptologos.cc/logos/bitcoin-btc-logo.png",
  ethereum: "https://cryptologos.cc/logos/ethereum-eth-logo.png"
};

/* Pricing */
const pricing = {
  roblox: {"Followers": 7/1000, "Group Members": 7/1000},
  twitch: {"Followers": 8/1000},
  tiktok: {"Followers": 7/1000, "Likes": 5/5000, "Views": 4/5000, "Saves": 4/500},
  instagram: {"Followers": 7/1000, "Views": 4/2500, "Likes": 4/500, "Reposts": 4/100}
};

/* Load dropdowns */
function loadPlatforms(){
  for(let k in pricing){
    let o=document.createElement("option");
    o.value=k;
    o.textContent=k.toUpperCase();
    platform.appendChild(o);
  }
}

function updateServices(){
  service.innerHTML="";
  let d=pricing[platform.value];
  for(let k in d){
    let o=document.createElement("option");
    o.value=k;
    o.textContent=k;
    service.appendChild(o);
  }
}

function loadExchange(){
  ["Cash App","PayPal","Crypto"].forEach(v=>{
    let o=document.createElement("option");
    o.textContent=v;
    from.appendChild(o.cloneNode(true));
    to.appendChild(o.cloneNode(true));
  });
}

/* Update preview */
function updatePreview(){
  if(mode==="services"){
    icon.src = icons[platform.value] || "";
    selectionText.innerText = `${platform.value.toUpperCase()} • ${service.value}`;
  } else {
    icon.src = icons["bitcoin"];
    selectionText.innerText = `${from.value} → ${to.value}`;
  }
}

/* Fee */
function fee(a){
  if(a<=10)return 1.25;
  if(a<=40)return 3.15;
  if(a<=70)return 5;
  if(a<=100)return 7.5;
  if(a<=200)return 12.5;
  if(a<=300)return 18.75;
  if(a<=500)return 27.5;
  if(a<=750)return 43.75;
  if(a<=1000)return 62.5;
  return 0;
}

/* Animation */
function animate(start,end){
  let startTime=null;
  function step(t){
    if(!startTime) startTime=t;
    let p=Math.min((t-startTime)/400,1);
    let val=start+(end-start)*p;
    mainResult.innerText="$"+val.toFixed(2);
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* Calc */
function calc(){
  let amt=parseFloat(amountInput.value);
  if(!amt){
    mainResult.innerText="$0";
    subResult.innerText="Enter amount";
    return;
  }

  if(mode==="services"){
    let cost=amt*pricing[platform.value][service.value];
    if(cost<1) cost=1;
    animate(0,cost);
    subResult.innerText="Service cost";
  } else {
    let f=fee(amt);
    let r=amt-f;
    animate(0,r);
    subResult.innerText=`Fee: $${f}`;
  }

  updatePreview();
}

/* Events */
servicesBtn.onclick=()=>{
  mode="services";
  servicesUI.style.display="block";
  exchangeUI.style.display="none";
};

exchangeBtn.onclick=()=>{
  mode="exchange";
  servicesUI.style.display="none";
  exchangeUI.style.display="block";
};

platform.onchange=()=>{updateServices();calc();}
service.onchange=calc;
from.onchange=calc;
to.onchange=calc;
amountInput.oninput=calc;

/* Init */
loadPlatforms();
updateServices();
loadExchange();
updatePreview();
</script>

</body>
</html>
