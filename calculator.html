<!DOCTYPE html>
<html>
<head>
<title>Calculator - Nexloria</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
.wrapper {
  max-width: 520px;
  margin: 120px auto;
  padding: 20px;
}

.calc-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(59,130,246,0.15);
  border-radius: 20px;
  padding: 30px;
  backdrop-filter: blur(12px);
}

.calc-title {
  font-size: 1.6rem;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

label {
  font-size: 0.8rem;
  color: #888;
  display: block;
  margin-top: 15px;
}

select, input {
  width: 100%;
  margin-top: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: white;
  padding: 12px;
  border-radius: 10px;
  font-size: 0.95rem;
}

select:focus, input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(59,130,246,0.3);
}

/* FIX dropdown visibility */
select option {
  background: #0a0a0a;
  color: white;
}

.result-box {
  margin-top: 25px;
  padding: 18px;
  border-radius: 14px;
  background: rgba(59,130,246,0.08);
  border: 1px solid rgba(59,130,246,0.2);
}

.result-main {
  font-size: 1.4rem;
}

.result-sub {
  font-size: 0.9rem;
  color: #aaa;
  margin-top: 5px;
}

.mode {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.mode button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #222;
  background: #111;
  color: #aaa;
  cursor: pointer;
  transition: 0.2s;
}

.mode button.active {
  border-color: var(--accent);
  color: white;
  box-shadow: 0 0 10px rgba(59,130,246,0.4);
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<nav>
<a href="/">Home</a>
<a href="/services.html">Services</a>
<a href="/calculator.html">Calculator</a>
<a href="/contact.html">Contact</a>
</nav>

<div class="wrapper">
<div class="calc-card">

<div class="calc-title">Calculator</div>

<div class="mode">
<button id="servicesBtn" class="active">Services</button>
<button id="exchangeBtn">Exchange</button>
</div>

<div id="servicesUI">
<label>Platform</label>
<select id="platform"></select>

<label>Service</label>
<select id="service"></select>
</div>

<div id="exchangeUI" style="display:none;">
<label>From</label>
<select>
<option>Cash App</option>
<option>PayPal</option>
<option>Apple Pay</option>
<option>Venmo</option>
<option>Zelle</option>
<option>Crypto</option>
</select>

<label>To</label>
<select>
<option>Bitcoin</option>
<option>Ethereum</option>
<option>Solana</option>
<option>Monero</option>
<option>Cash App</option>
<option>PayPal</option>
</select>
</div>

<label>Amount</label>
<input type="number" id="amount" placeholder="e.g. 250, 5000">

<div class="result-box">
<div class="result-main" id="mainResult">$0</div>
<div class="result-sub" id="subResult">Enter amount to calculate</div>
</div>

</div>
</div>

<footer style="text-align:center; padding:40px; color:#999; border-top:1px solid rgba(255,255,255,0.05);">
© 2026 Nexloria
</footer>

<script src="script.js"></script>

<script>
const servicesBtn = document.getElementById("servicesBtn");
const exchangeBtn = document.getElementById("exchangeBtn");

const servicesUI = document.getElementById("servicesUI");
const exchangeUI = document.getElementById("exchangeUI");

const platform = document.getElementById("platform");
const service = document.getElementById("service");
const amountInput = document.getElementById("amount");

const mainResult = document.getElementById("mainResult");
const subResult = document.getElementById("subResult");

let mode = "services";

/* Pricing */
const pricing = {
  roblox: {"Followers": 7/1000, "Group Members": 7/1000},
  twitch: {"Followers": 8/1000},
  tiktok: {"Followers": 7/1000, "Likes": 5/5000, "Views": 4/5000, "Saves": 4/500},
  instagram: {"Followers": 7/1000, "Views": 4/2500, "Likes": 4/500, "Reposts": 4/100}
};

function loadPlatforms(){
  for(let key in pricing){
    let o = document.createElement("option");
    o.value = key;
    o.textContent = key.toUpperCase();
    platform.appendChild(o);
  }
}

function updateServices(){
  service.innerHTML = "";
  let data = pricing[platform.value];
  for(let k in data){
    let o = document.createElement("option");
    o.value = k;
    o.textContent = k;
    service.appendChild(o);
  }
}

function fee(a){
  if(a<=10)return 1.25;
  if(a<=40)return 3.15;
  if(a<=70)return 5;
  if(a<=100)return 7.5;
  if(a<=200)return 12.5;
  if(a<=300)return 18.75;
  if(a<=500)return 27.5;
  if(a<=750)return 43.75;
  if(a<=1000)return 62.5;
  return 0;
}

/* Animation */
function animateValue(start, end, duration, callback) {
  let startTime = null;

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    const progress = Math.min((timestamp - startTime) / duration, 1);
    const value = start + (end - start) * progress;

    callback(value);

    if (progress < 1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

/* Calculate */
function calc(){
  let amt = parseFloat(amountInput.value);

  if(!amt){
    mainResult.innerText="$0";
    subResult.innerText="Enter amount to calculate";
    return;
  }

  if(mode==="services"){
    let cost = amt * pricing[platform.value][service.value];
    if(cost < 1) cost = 1;

    animateValue(0, cost, 400, (val)=>{
      mainResult.innerText = "$" + val.toFixed(2);
    });

    subResult.innerText = "Service cost (no fees)";
  }

  if(mode==="exchange"){
    let f = fee(amt);
    let receive = amt - f;

    animateValue(0, receive, 400, (val)=>{
      mainResult.innerText = "$" + val.toFixed(2);
    });

    subResult.innerText = `Fee: $${f.toFixed(2)} • You send: $${amt}`;
  }
}

/* Mode switching */
servicesBtn.onclick = ()=>{
  mode="services";
  servicesBtn.classList.add("active");
  exchangeBtn.classList.remove("active");
  servicesUI.style.display="block";
  exchangeUI.style.display="none";
  calc();
};

exchangeBtn.onclick = ()=>{
  mode="exchange";
  exchangeBtn.classList.add("active");
  servicesBtn.classList.remove("active");
  servicesUI.style.display="none";
  exchangeUI.style.display="block";
  calc();
};

platform.onchange = ()=>{ updateServices(); calc(); };
service.onchange = calc;
amountInput.oninput = calc;

loadPlatforms();
updateServices();
</script>

</body>
</html>
