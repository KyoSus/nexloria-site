<!DOCTYPE html>
<html>
<head>
<title>Calculator - Nexloria</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
.container {
  max-width: 500px;
  margin: 100px auto;
  padding: 20px;
}

select, input {
  width: 100%;
  margin-top: 10px;
  margin-bottom: 15px;
}

.result {
  margin-top: 20px;
  font-size: 1.2rem;
  color: var(--accent);
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<nav>
<a href="/">Home</a>
<a href="/services.html">Services</a>
<a href="/calculator.html">Calculator</a>
<a href="/contact.html">Contact</a>
</nav>

<div class="container">
<h1>Calculator</h1>

<label>Mode</label>
<select id="mode">
<option value="services">Services</option>
<option value="exchange">Exchange</option>
</select>

<!-- SERVICES UI -->
<div id="servicesUI">
<label>Platform</label>
<select id="platform"></select>

<label>Service</label>
<select id="service"></select>
</div>

<!-- EXCHANGE UI -->
<div id="exchangeUI" style="display:none;">
<label>From</label>
<select id="from">
<option>Cash App</option>
<option>PayPal</option>
<option>Apple Pay</option>
<option>Venmo</option>
<option>Zelle</option>
<option>Crypto</option>
</select>

<label>To</label>
<select id="to">
<option>Bitcoin</option>
<option>Ethereum</option>
<option>Solana</option>
<option>Monero</option>
<option>Cash App</option>
<option>PayPal</option>
</select>
</div>

<label>Amount ($)</label>
<input type="number" id="amount" placeholder="Enter amount">

<div class="result" id="result">
Cost: $0 | Fee: $0 | Total: $0
</div>
</div>

<footer style="text-align:center; padding:40px; color:#999; border-top:1px solid rgba(255,255,255,0.05);">
© 2026 Nexloria
</footer>

<script src="script.js"></script>

<script>
const mode = document.getElementById("mode");
const servicesUI = document.getElementById("servicesUI");
const exchangeUI = document.getElementById("exchangeUI");

const platform = document.getElementById("platform");
const service = document.getElementById("service");
const amountInput = document.getElementById("amount");
const result = document.getElementById("result");

/* PRICING */
const pricing = {
  roblox: {
    "Followers": 7/1000,
    "Group Members": 7/1000
  },
  twitch: {
    "Followers": 8/1000
  },
  tiktok: {
    "Followers": 7/1000,
    "Likes": 5/5000,
    "Views": 4/5000,
    "Saves": 4/500
  },
  instagram: {
    "Followers": 7/1000,
    "Views": 4/2500,
    "Likes": 4/500,
    "Reposts": 4/100
  }
};

/* Populate platform dropdown */
function loadPlatforms() {
  platform.innerHTML = "";
  for (let key in pricing) {
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = key.toUpperCase();
    platform.appendChild(opt);
  }
}

/* Populate services */
function updateServices() {
  service.innerHTML = "";
  const selected = pricing[platform.value];

  for (let key in selected) {
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = key;
    service.appendChild(opt);
  }
}

/* FEES (EXCHANGE ONLY) */
function getFee(amt) {
  if (amt <= 10) return 1.25;
  if (amt <= 40) return 3.15;
  if (amt <= 70) return 5.00;
  if (amt <= 100) return 7.50;
  if (amt <= 200) return 12.50;
  if (amt <= 300) return 18.75;
  if (amt <= 500) return 27.50;
  if (amt <= 750) return 43.75;
  if (amt <= 1000) return 62.50;
  return 0;
}

/* CALCULATE */
function calculate() {
  const amt = parseFloat(amountInput.value);
  if (!amt || amt <= 0) {
    result.innerText = "Cost: $0 | Fee: $0 | Total: $0";
    return;
  }

  if (mode.value === "services") {
    const rate = pricing[platform.value][service.value];
    let cost = amt * rate;

    if (cost < 1) cost = 1;

    result.innerText =
      `Cost: $${cost.toFixed(2)} | Total: $${cost.toFixed(2)}`;
  }

  if (mode.value === "exchange") {
    const fee = getFee(amt);
    const total = (amt + fee).toFixed(2);

    result.innerText =
      `You Send: $${amt.toFixed(2)} | Fee: $${fee.toFixed(2)} | You Receive: $${(amt - fee).toFixed(2)}`;
  }
}

/* MODE SWITCH */
mode.addEventListener("change", () => {
  if (mode.value === "services") {
    servicesUI.style.display = "block";
    exchangeUI.style.display = "none";
  } else {
    servicesUI.style.display = "none";
    exchangeUI.style.display = "block";
  }
  calculate();
});

/* EVENTS */
platform.addEventListener("change", () => {
  updateServices();
  calculate();
});

service.addEventListener("change", calculate);
amountInput.addEventListener("input", calculate);

/* INIT */
loadPlatforms();
updateServices();
</script>

</body>
</html>
