<!DOCTYPE html>
<html>
<head>
  <title>Contact - Nexloria</title>
  <style>
    body { background:#000; color:white; font-family:Arial; }
    nav { text-align:center; padding:20px; backdrop-filter:blur(10px); background:rgba(0,0,0,0.4);}
    a { color:#aaa; margin:10px; text-decoration:none; }

    form {
      max-width:500px;
      margin:80px auto;
      background:rgba(255,255,255,0.05);
      padding:25px;
      border-radius:12px;
      backdrop-filter:blur(10px);
    }

    input, textarea {
      width:100%;
      margin:10px 0;
      padding:12px;
      background:#111;
      border:1px solid #222;
      color:white;
    }

    button {
      width:100%;
      padding:12px;
      background:white;
      color:black;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>

<nav>
  <a href="/">Home</a>
  <a href="/services.html">Services</a>
  <a href="/contact.html">Contact</a>
</nav>

<form name="contact" method="POST" data-netlify="true" action="/thank-you">
  <input type="hidden" name="form-name" value="contact" />
  <input type="text" name="name" placeholder="Name" required>
  <input type="email" name="email" placeholder="Email" required>
  <textarea name="message" placeholder="Message" required></textarea>
  <button type="submit">Send</button>
</form>

</body>
</html>
